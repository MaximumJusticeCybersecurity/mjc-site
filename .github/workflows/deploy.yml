name: Validate MJC Website V12.2 Static Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-static-site:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Confirm required static files exist
        run: |
          test -f index.html
          test -f robots.txt
          test -f sitemap.xml
          test -f llms.txt
          test -d assets
          echo "MJC Website V12.2 static package validated successfully."
