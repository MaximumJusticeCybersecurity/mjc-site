name: MJC Site Conversion Check

on:
  pull_request:
    paths:
      - site/index.html
      - site/llms.txt
      - content-governance.json
      - .github/workflows/mjc-site-conversion-check.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  conversion-check:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Check out reviewed commit
        uses: actions/checkout@v4

      - name: Verify current content and boundaries
        shell: bash
        run: |
          set -euo pipefail
          grep -Fq 'Before your organization acts on AI, make the recommendation defensible.' site/index.html
          grep -Fq 'Challenge One AI Recommendation' site/index.html
          grep -Fq 'See the 3-Minute Vendor-Risk Example' site/index.html
          grep -Fq 'AI Trust Decision Record' site/index.html
          grep -Fq 'Is this another AI judging the first AI?' site/index.html
          grep -Fq 'Executive Operational Visibility' site/index.html
          grep -Fq 'Pilot pricing and delivery schedule are confirmed after scope review.' site/index.html
          grep -Fq 'https://maximumjusticecybersecurity.github.io/CyberShield/vendor-risk-next.html' site/index.html
          grep -Fq 'https://maximumjusticecybersecurity.github.io/CyberShield/' site/index.html
          grep -Fq 'https://calendly.com/maxjustice' site/index.html
          grep -Fq 'mailto:max@maximumjusticecybersecurity.com' site/index.html
          ! grep -Fq 'Generate Your TrustMap' site/index.html
          ! grep -Fq 'Internal QA' site/index.html
          ! grep -Fq 'Generate Your TrustMap' site/llms.txt
          grep -Fq 'AI-generated recommendation in -> defensible AI Trust Decision Record out.' site/llms.txt
          python -m json.tool content-governance.json > /dev/null
          grep -Fq '"deployment_performed": false' content-governance.json

      - name: Start local site
        shell: bash
        run: |
          set -euo pipefail
          python3 -m http.server 4173 --bind 127.0.0.1 --directory site > /tmp/mjc-site-http.log 2>&1 &
          echo $! > /tmp/mjc-site-http.pid
          for attempt in {1..20}; do
            if curl --fail --silent http://127.0.0.1:4173/ > /dev/null; then
              exit 0
            fi
            sleep 0.5
          done
          cat /tmp/mjc-site-http.log
          exit 1

      - name: Locate Chrome
        id: chrome
        shell: bash
        run: |
          set -euo pipefail
          CHROME="$(command -v google-chrome-stable || command -v google-chrome || command -v chromium-browser || command -v chromium || true)"
          test -n "$CHROME"
          echo "path=$CHROME" >> "$GITHUB_OUTPUT"
          "$CHROME" --version

      - name: Render desktop and mobile evidence
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          CHROME='${{ steps.chrome.outputs.path }}'
          "$CHROME" --headless=new --no-sandbox --disable-gpu --hide-scrollbars --run-all-compositor-stages-before-draw --virtual-time-budget=4000 --window-size=1440,1200 --screenshot="$PWD/artifacts/mjc-site-desktop.png" http://127.0.0.1:4173/
          "$CHROME" --headless=new --no-sandbox --disable-gpu --hide-scrollbars --run-all-compositor-stages-before-draw --virtual-time-budget=4000 --window-size=390,844 --screenshot="$PWD/artifacts/mjc-site-mobile.png" http://127.0.0.1:4173/
          "$CHROME" --headless=new --no-sandbox --disable-gpu --virtual-time-budget=4000 --dump-dom http://127.0.0.1:4173/ > artifacts/mjc-site-dom.html
          grep -Fq 'Before your organization acts on AI' artifacts/mjc-site-dom.html
          grep -Fq 'Challenge One AI Recommendation' artifacts/mjc-site-dom.html

      - name: Upload review evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mjc-site-conversion-evidence
          path: artifacts/
          if-no-files-found: warn
          retention-days: 14

      - name: Stop local site
        if: always()
        shell: bash
        run: |
          if test -f /tmp/mjc-site-http.pid; then
            kill "$(cat /tmp/mjc-site-http.pid)" || true
          fi
          cat /tmp/mjc-site-http.log || true
